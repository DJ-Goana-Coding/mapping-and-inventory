name: Bridge-Push-Protocol

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Bridge Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate District Artifacts
        run: |
          # Create placeholder scripts if they don't exist
          mkdir -p scripts
          
          # Generate TREE.md
          if [ -f scripts/generate_tree.py ]; then
            python scripts/generate_tree.py > TREE.md
          else
            echo "# District File Tree" > TREE.md
            echo "" >> TREE.md
            echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> TREE.md
            echo "" >> TREE.md
            tree -L 3 -I '.git|__pycache__|*.pyc' . >> TREE.md 2>/dev/null || find . -type f -not -path './.git/*' | head -100 >> TREE.md
          fi
          
          # Generate INVENTORY.json
          if [ -f scripts/generate_inventory.py ]; then
            python scripts/generate_inventory.py > INVENTORY.json
          else
            echo '{' > INVENTORY.json
            echo '  "generated": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",' >> INVENTORY.json
            echo '  "repository": "'${GITHUB_REPOSITORY}'",' >> INVENTORY.json
            echo '  "commit": "'${GITHUB_SHA}'",' >> INVENTORY.json
            echo '  "files": []' >> INVENTORY.json
            echo '}' >> INVENTORY.json
          fi
          
          # Generate SCAFFOLD.md
          if [ -f scripts/generate_scaffold.py ]; then
            python scripts/generate_scaffold.py > SCAFFOLD.md
          else
            echo "# District Architecture Scaffold" > SCAFFOLD.md
            echo "" >> SCAFFOLD.md
            echo "**Repository**: ${GITHUB_REPOSITORY}" >> SCAFFOLD.md
            echo "**Generated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> SCAFFOLD.md
            echo "" >> SCAFFOLD.md
            echo "## Structure" >> SCAFFOLD.md
            echo "This is an automated scaffold. Custom generator scripts can be added to scripts/ directory." >> SCAFFOLD.md
          fi

      - name: Push to Mapping Hub
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "Bridge-Agent"
          git config --global user.email "bridge@citadel.omega"

          git add TREE.md INVENTORY.json SCAFFOLD.md
          git commit -m "Bridge Sync: Updated District Artifacts [skip ci]" || echo "No changes to commit"
          
          # Only push if there are changes
          if git diff-index --quiet HEAD --; then
            echo "No changes to push"
          else
            git push origin main
          fi

      - name: Trigger OMNI-Surveyor-Sync
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Trigger the Surveyor workflow in Mapping-and-Inventory
          gh workflow run multi_repo_sync.yml \
            --repo DJ-Goana-Coding/mapping-and-inventory \
            --ref main \
            -f trigger_workflows=true || echo "Surveyor trigger failed - workflow may not exist yet"
          
          echo "✅ Bridge Push Protocol complete"
          echo "📡 Artifacts synchronized to Hub"
          echo "🔭 Surveyor sync triggered"
