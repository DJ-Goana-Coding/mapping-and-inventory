name: Pulse Sync Master
# CITADEL GRAND UNIFICATION - Phase 1.3: Hub Coordination Workflow
# Coordinates all repository synchronization across GitHub and HuggingFace

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'Sync mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - github_only
          - huggingface_only
          - test

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  census:
    name: Build Repository Census
    runs-on: ubuntu-latest
    outputs:
      total_repos: ${{ steps.census.outputs.total_repos }}
      census_file: ${{ steps.census.outputs.census_file }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Build Complete Repository Census
        id: census
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "🏛️ Building Complete Repository Census..."
          python scripts/citadel_grand_unification/complete_repo_census.py
          
          if [ -f data/discoveries/complete_repo_census.json ]; then
            total_repos=$(jq '.summary.total_github_repos // 0' data/discoveries/complete_repo_census.json)
            echo "total_repos=$total_repos" >> $GITHUB_OUTPUT
            echo "census_file=data/discoveries/complete_repo_census.json" >> $GITHUB_OUTPUT
            echo "✅ Census complete: $total_repos GitHub repositories discovered"
          else
            echo "⚠️ Census file not created"
            echo "total_repos=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload Census Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repository-census
          path: data/discoveries/complete_repo_census.json
          retention-days: 30
      
      - name: Commit Census Results
        run: |
          git config user.name "Citadel Architect"
          git config user.email "citadel@mapping-and-inventory"
          git add data/discoveries/complete_repo_census.json
          git diff --staged --quiet || git commit -m "📊 Repository Census Update - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || echo "No changes to push"
  
  sync_status:
    name: Sync Status Report
    runs-on: ubuntu-latest
    needs: census
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Download Census
        uses: actions/download-artifact@v4
        with:
          name: repository-census
          path: data/discoveries/
      
      - name: Generate Sync Status Report
        run: |
          echo "# 🏛️ CITADEL PULSE SYNC REPORT" > data/monitoring/pulse_sync_report.md
          echo "" >> data/monitoring/pulse_sync_report.md
          echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> data/monitoring/pulse_sync_report.md
          echo "**Total Repositories:** ${{ needs.census.outputs.total_repos }}" >> data/monitoring/pulse_sync_report.md
          echo "" >> data/monitoring/pulse_sync_report.md
          echo "## Repository Census" >> data/monitoring/pulse_sync_report.md
          echo "- GitHub Repositories: ${{ needs.census.outputs.total_repos }}" >> data/monitoring/pulse_sync_report.md
          echo "- Census File: \`${{ needs.census.outputs.census_file }}\`" >> data/monitoring/pulse_sync_report.md
          echo "" >> data/monitoring/pulse_sync_report.md
          echo "## Authority Chain" >> data/monitoring/pulse_sync_report.md
          echo "1. HuggingFace Spaces (L4 - highest authority)" >> data/monitoring/pulse_sync_report.md
          echo "2. GitHub Repositories (L3)" >> data/monitoring/pulse_sync_report.md
          echo "3. GDrive Metadata (L2)" >> data/monitoring/pulse_sync_report.md
          echo "4. Local Nodes (L1 - lowest authority)" >> data/monitoring/pulse_sync_report.md
          
          cat data/monitoring/pulse_sync_report.md
      
      - name: Commit Status Report
        run: |
          git config user.name "Citadel Architect"
          git config user.email "citadel@mapping-and-inventory"
          git add data/monitoring/pulse_sync_report.md
          git diff --staged --quiet || git commit -m "🔄 Pulse Sync Report - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || echo "No changes to push"

  notify:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [census, sync_status]
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## 🏛️ Pulse Sync Master Workflow Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Census Status:** ${{ needs.census.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Sync Status:** ${{ needs.sync_status.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Repositories:** ${{ needs.census.outputs.total_repos }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Authority Chain Maintained" >> $GITHUB_STEP_SUMMARY
          echo "✅ HuggingFace > GitHub > GDrive > Local" >> $GITHUB_STEP_SUMMARY
