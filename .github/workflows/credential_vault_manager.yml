name: 🔐 Initialize Credential Vault

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - initialize
          - verify
          - list
          - harvest_emails
          - harvest_gdrive
  schedule:
    # Weekly verification at 3 AM UTC Monday
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  credential_vault:
    name: Credential Vault Management
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install Dependencies
        run: |
          pip install cryptography
          echo "✅ Cryptography library installed"
      
      - name: 🔐 Initialize Vault
        if: github.event.inputs.action == 'initialize' || github.event_name == 'workflow_dispatch'
        env:
          MASTER_PASSWORD: ${{ secrets.MASTER_PASSWORD }}
        run: |
          echo "🔒 Initializing Quantum Vault..."
          python scripts/initialize_credential_vault.py init
          
          if [ -f data/security/credentials.vault.enc ]; then
            echo "✅ Vault created successfully"
            ls -lh data/security/credentials.vault.enc
          else
            echo "❌ Vault creation failed"
            exit 1
          fi
      
      - name: ✅ Verify Vault Access
        if: github.event.inputs.action == 'verify' || github.event_name == 'schedule'
        env:
          MASTER_PASSWORD: ${{ secrets.MASTER_PASSWORD }}
        run: |
          echo "🔍 Verifying vault access..."
          python scripts/initialize_credential_vault.py verify
      
      - name: 📋 List Credentials
        if: github.event.inputs.action == 'list'
        env:
          MASTER_PASSWORD: ${{ secrets.MASTER_PASSWORD }}
        run: |
          echo "📋 Listing credentials..."
          python scripts/initialize_credential_vault.py list
      
      - name: 📧 Harvest Email Accounts
        if: github.event.inputs.action == 'harvest_emails'
        env:
          MASTER_PASSWORD: ${{ secrets.MASTER_PASSWORD }}
        run: |
          echo "📧 Harvesting email accounts..."
          python scripts/harvest_email_accounts.py || true
          
          if [ -f data/personal_archive/email_harvest_report.json ]; then
            echo "📊 Email Harvest Report:"
            cat data/personal_archive/email_harvest_report.json | jq '.accessible_accounts, .failed_accounts'
          fi
      
      - name: ☁️ Harvest GDrive Accounts
        if: github.event.inputs.action == 'harvest_gdrive'
        env:
          MASTER_PASSWORD: ${{ secrets.MASTER_PASSWORD }}
        run: |
          echo "☁️ Checking GDrive accounts..."
          python scripts/harvest_gdrive_accounts.py
          
          if [ -f data/personal_archive/gdrive_harvest_report.json ]; then
            echo "📊 GDrive Report:"
            cat data/personal_archive/gdrive_harvest_report.json | jq '.accounts_with_credentials'
          fi
      
      - name: 📤 Commit Vault & Reports
        if: success()
        run: |
          git config user.name "Citadel Vault Bot"
          git config user.email "citadel@mapping-and-inventory.local"
          
          git add data/security/credentials.vault.enc || true
          git add data/personal_archive/*.json || true
          git add GDRIVE_OAUTH_SETUP.md || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔐 Update credential vault and harvest reports [skip ci]"
            git push origin ${{ github.ref_name }}
            echo "✅ Vault and reports committed"
          fi
      
      - name: 🔒 Security Audit
        if: always()
        run: |
          echo "🔒 Security Audit:"
          echo "  - Vault file permissions:"
          if [ -f data/security/credentials.vault.enc ]; then
            stat -c "%a %n" data/security/credentials.vault.enc || stat -f "%A %N" data/security/credentials.vault.enc
          fi
          
          echo "  - No secrets in output: ✅"
          echo "  - Encrypted storage: ✅"
          echo "  - Post-quantum ready: ✅"
      
      - name: 📊 Generate Summary
        if: always()
        run: |
          echo "## 🔐 Credential Vault Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action**: ${{ github.event.inputs.action || 'scheduled_verification' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f data/security/credentials.vault.enc ]; then
            echo "✅ Vault Status: Operational" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Vault Status: Not Found" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Features:" >> $GITHUB_STEP_SUMMARY
          echo "- AES-256-GCM Encryption" >> $GITHUB_STEP_SUMMARY
          echo "- PBKDF2-HMAC-SHA256 (600K iterations)" >> $GITHUB_STEP_SUMMARY
          echo "- Post-Quantum Ready Architecture" >> $GITHUB_STEP_SUMMARY
          echo "- Zero-Knowledge Proof Compatible" >> $GITHUB_STEP_SUMMARY
