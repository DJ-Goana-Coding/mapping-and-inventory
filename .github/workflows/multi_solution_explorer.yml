name: 🔬 Multi-Solution Explorer
# Tests all generated solutions in parallel

on:
  workflow_dispatch:
    inputs:
      problem_id:
        description: 'Problem ID to test (e.g., P001) or "all"'
        required: true
        default: 'all'

permissions:
  contents: write
  actions: read

jobs:
  explore-solutions:
    name: Test Solutions - ${{ matrix.problem_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        # Will be dynamically populated, but here are examples
        problem_id: [P001, P002, P003, P004, P005]
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔬 Validate Solutions for ${{ matrix.problem_id }}
        run: |
          echo "🧪 Validating solutions for ${{ matrix.problem_id }}..."
          python scripts/experimental_validator.py ${{ matrix.problem_id }}
      
      - name: 📊 Extract Results
        if: always()
        run: |
          if [ -f data/experiments/validation_results/${{ matrix.problem_id }}_validation.json ]; then
            python -c "
import json
with open('data/experiments/validation_results/${{ matrix.problem_id }}_validation.json') as f:
    data = json.load(f)

solutions = data.get('validated_solutions', [])
passed = sum(1 for s in solutions if s.get('status') == 'passed')
failed = sum(1 for s in solutions if s.get('status') == 'failed')

print(f'Problem ${{ matrix.problem_id }}: {passed} passed, {failed} failed out of {len(solutions)} solutions')
"
          fi
      
      - name: 📤 Upload Validation Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-${{ matrix.problem_id }}
          path: data/experiments/validation_results/${{ matrix.problem_id }}_validation.json
          retention-days: 30
  
  consolidate-results:
    name: Consolidate All Results
    runs-on: ubuntu-latest
    needs: explore-solutions
    if: always()
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: validation-results
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📊 Generate Consolidated Report
        run: |
          python -c "
import json
from pathlib import Path
import os

results_dir = Path('validation-results')
all_results = []

for json_file in results_dir.rglob('*.json'):
    try:
        with open(json_file) as f:
            data = json.load(f)
            all_results.append(data)
    except:
        pass

total_solutions = 0
total_passed = 0
total_failed = 0

for result in all_results:
    solutions = result.get('validated_solutions', [])
    total_solutions += len(solutions)
    total_passed += sum(1 for s in solutions if s.get('status') == 'passed')
    total_failed += sum(1 for s in solutions if s.get('status') == 'failed')

print(f'# 🔬 Multi-Solution Exploration Report')
print(f'')
print(f'**Date:** $(date -u \"+%Y-%m-%d %H:%M UTC\")')
print(f'**Problems Tested:** {len(all_results)}')
print(f'**Total Solutions:** {total_solutions}')
print(f'**Passed:** {total_passed}')
print(f'**Failed:** {total_failed}')
print(f'**Success Rate:** {(total_passed/total_solutions*100) if total_solutions > 0 else 0:.1f}%')
" > MULTI_SOLUTION_REPORT.md
          
          cat MULTI_SOLUTION_REPORT.md
      
      - name: 📤 Upload Consolidated Report
        uses: actions/upload-artifact@v4
        with:
          name: multi-solution-report
          path: MULTI_SOLUTION_REPORT.md
          retention-days: 30
