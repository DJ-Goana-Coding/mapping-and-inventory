name: Spoke Registration
# CITADEL GRAND UNIFICATION - Phase 1.3: Auto-Discovery of New Repositories
# Automatically discovers and registers new spokes connecting to the hub

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:
    inputs:
      force_full_scan:
        description: 'Force full repository scan'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  discover_spokes:
    name: Discover and Register Spokes
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Discover GitHub Repositories
        id: discover
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "🔍 Discovering all repositories..."
          python scripts/citadel_grand_unification/complete_repo_census.py
          
          if [ -f data/discoveries/complete_repo_census.json ]; then
            total_repos=$(jq '.summary.total_github_repos // 0' data/discoveries/complete_repo_census.json)
            echo "discovered_repos=$total_repos" >> $GITHUB_OUTPUT
            echo "✅ Discovered $total_repos repositories"
          fi
      
      - name: Generate Spoke Registry
        run: |
          echo "📋 Generating spoke registry..."
          
          mkdir -p data/discoveries
          
          # Create spoke registry from census data
          if [ -f data/discoveries/complete_repo_census.json ]; then
            jq '{
              metadata: {
                timestamp: .metadata.timestamp,
                version: "1.0.0",
                hub: "mapping-and-inventory"
              },
              spokes: [
                .github_repos[] | {
                  name: .name,
                  type: (
                    if .name == "mapping-and-inventory" then "primary_hub"
                    elif (.name | contains("CITADEL") or contains("OMEGA") or contains("TIA")) then "primary_spoke"
                    elif (.name | contains("District") or contains("D0")) then "district_spoke"
                    elif (.name | contains("garage") or contains("trading")) then "trading_spoke"
                    elif (.name | contains("vault") or contains("genetics")) then "cognitive_spoke"
                    else "spoke"
                    end
                  ),
                  url: .url,
                  language: .language,
                  size_mb: .size_mb,
                  last_activity: .last_activity,
                  connected_to_hub: true
                }
              ],
              summary: {
                total_spokes: (.github_repos | length),
                primary_hub: 1,
                primary_spokes: ([.github_repos[] | select(.name | contains("CITADEL") or contains("OMEGA") or contains("TIA"))] | length),
                district_spokes: ([.github_repos[] | select(.name | contains("District") or contains("D0"))] | length),
                trading_spokes: ([.github_repos[] | select(.name | contains("garage") or contains("trading"))] | length),
                cognitive_spokes: ([.github_repos[] | select(.name | contains("vault") or contains("genetics"))] | length)
              }
            }' data/discoveries/complete_repo_census.json > data/discoveries/spoke_registry.json
            
            echo "✅ Spoke registry generated"
            cat data/discoveries/spoke_registry.json | jq '.summary'
          fi
      
      - name: Update Master Inventory
        run: |
          echo "📊 Updating master inventory..."
          
          if [ -f data/discoveries/spoke_registry.json ]; then
            # Update master_inventory.json with spoke data
            if [ -f master_inventory.json ]; then
              # Merge with existing inventory
              jq -s '.[0] * {
                repositories: (.[1].spokes // []),
                last_updated: (.[1].metadata.timestamp // now | todate),
                total_repositories: (.[1].summary.total_spokes // 0)
              }' master_inventory.json data/discoveries/spoke_registry.json > master_inventory_new.json
              mv master_inventory_new.json master_inventory.json
            else
              # Create new inventory
              jq '{
                metadata: .metadata,
                repositories: .spokes,
                summary: .summary,
                last_updated: .metadata.timestamp
              }' data/discoveries/spoke_registry.json > master_inventory.json
            fi
            
            echo "✅ Master inventory updated"
          fi
      
      - name: Commit Registry Updates
        run: |
          git config user.name "Citadel Architect"
          git config user.email "citadel@mapping-and-inventory"
          
          git add data/discoveries/spoke_registry.json
          git add master_inventory.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🗺️ Spoke Registration Update - $(date -u +%Y-%m-%dT%H:%M:%SZ)

- Discovered: ${{ steps.discover.outputs.discovered_repos }} repositories
- Registry: data/discoveries/spoke_registry.json
- Inventory: master_inventory.json

Authority Chain: HuggingFace > GitHub > GDrive > Local"
            git push
          fi
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spoke-registry
          path: |
            data/discoveries/spoke_registry.json
            data/discoveries/complete_repo_census.json
            master_inventory.json
          retention-days: 30
      
      - name: Summary
        run: |
          echo "## 🗺️ Spoke Registration Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f data/discoveries/spoke_registry.json ]; then
            echo "**Total Spokes:** $(jq '.summary.total_spokes' data/discoveries/spoke_registry.json)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Spoke Breakdown" >> $GITHUB_STEP_SUMMARY
            echo "- Primary Hub: $(jq '.summary.primary_hub' data/discoveries/spoke_registry.json)" >> $GITHUB_STEP_SUMMARY
            echo "- Primary Spokes: $(jq '.summary.primary_spokes' data/discoveries/spoke_registry.json)" >> $GITHUB_STEP_SUMMARY
            echo "- District Spokes: $(jq '.summary.district_spokes' data/discoveries/spoke_registry.json)" >> $GITHUB_STEP_SUMMARY
            echo "- Trading Spokes: $(jq '.summary.trading_spokes' data/discoveries/spoke_registry.json)" >> $GITHUB_STEP_SUMMARY
            echo "- Cognitive Spokes: $(jq '.summary.cognitive_spokes' data/discoveries/spoke_registry.json)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Hub Topology" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "mapping-and-inventory (Primary Hub)" >> $GITHUB_STEP_SUMMARY
          echo "├── CITADEL Spokes (OMEGA, TIA, etc.)" >> $GITHUB_STEP_SUMMARY
          echo "├── District Spokes (D01-D12)" >> $GITHUB_STEP_SUMMARY
          echo "├── Trading Spokes (Garages)" >> $GITHUB_STEP_SUMMARY
          echo "└── Cognitive Spokes (Vaults, Genetics)" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
