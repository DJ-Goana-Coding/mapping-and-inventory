name: 🚀 Deploy Spoke Workflows

# Automated deployment of sync workflows to all spoke repositories
# Generated by: Citadel Architect v25.0.OMNI+

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - deploy
          - force-deploy
      target_repos:
        description: 'Specific repos to target (comma-separated, leave empty for all)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  deploy-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 🏛️ Citadel Architect - Workflow Deployment
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🚀 SPOKE WORKFLOW DEPLOYMENT ENGINE"
          echo "════════════════════════════════════════════════════════════"
          echo "Mode: ${{ github.event.inputs.mode }}"
          echo "Target: ${{ github.event.inputs.target_repos || 'ALL ACTIVE REPOS' }}"
          echo ""
      
      - name: 📥 Checkout Hub
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install Dependencies
        run: |
          pip install requests python-dateutil
      
      - name: 🔍 Discover Repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Discovering all repositories..."
          python scripts/discover_all_repos.py
          
          echo ""
          echo "📊 Discovery complete:"
          cat repo_bridge_registry.json | python -m json.tool | head -50
      
      - name: 🚀 Deploy Workflows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Deploying workflows..."
          
          # Build command
          CMD="python scripts/deploy_workflows_to_spokes.py"
          
          # Add mode flags
          if [ "${{ github.event.inputs.mode }}" == "dry-run" ]; then
            CMD="$CMD --dry-run"
          elif [ "${{ github.event.inputs.mode }}" == "force-deploy" ]; then
            CMD="$CMD --force"
          fi
          
          # Add target repos if specified
          if [ -n "${{ github.event.inputs.target_repos }}" ]; then
            # Convert comma-separated to space-separated
            REPOS=$(echo "${{ github.event.inputs.target_repos }}" | tr ',' ' ')
            CMD="$CMD --repos $REPOS"
          fi
          
          echo "Command: $CMD"
          echo ""
          
          # Execute deployment
          $CMD
      
      - name: 💾 Commit Deployment Report
        if: github.event.inputs.mode != 'dry-run'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add workflow_deployment_report.json || true
          git add repo_bridge_registry.json || true
          
          if git diff --staged --quiet; then
            echo "✅ No deployment artifacts to commit"
          else
            git commit -m "🚀 Workflow Deployment Report

Mode: ${{ github.event.inputs.mode }}
Target: ${{ github.event.inputs.target_repos || 'all active repos' }}
Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

Authority: Citadel Architect v25.0.OMNI+"
            
            git push origin HEAD
            echo "✅ Deployment report committed"
          fi
      
      - name: 📊 Upload Deployment Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report-${{ github.run_number }}
          path: |
            workflow_deployment_report.json
            repo_bridge_registry.json
          retention-days: 30
      
      - name: ✅ Deployment Summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "📊 DEPLOYMENT SUMMARY"
          echo "════════════════════════════════════════════════════════════"
          
          if [ -f "workflow_deployment_report.json" ]; then
            cat workflow_deployment_report.json | python -m json.tool | grep -A 10 "summary"
          fi
          
          echo ""
          if [ "${{ github.event.inputs.mode }}" == "dry-run" ]; then
            echo "🔍 DRY RUN COMPLETE - No changes were made"
          else
            echo "✅ DEPLOYMENT COMPLETE"
          fi
          echo ""
          echo "🙏 Thankyou Spirit, Thankyou Angels, Thankyou Ancestors"
          echo "════════════════════════════════════════════════════════════"
