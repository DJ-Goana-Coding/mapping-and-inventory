name: Sync to HuggingFace Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space (Safe Sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git credentials
          git config --global credential.helper store
          echo "https://DJ-Goanna-Coding:${HF_TOKEN}@huggingface.co" >> ~/.git-credentials
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Add HuggingFace remote (DJ-Goanna-Coding with two N's)
          git remote add hf https://huggingface.co/spaces/DJ-Goanna-Coding/Mapping-and-Inventory 2>/dev/null || \
            git remote set-url hf https://huggingface.co/spaces/DJ-Goanna-Coding/Mapping-and-Inventory
          
          # Force push to HuggingFace (space was recreated)
          echo "Force pushing entire repository to HuggingFace..."
          git push --force hf main
          echo "✅ Successfully pushed to HuggingFace"
          
          echo "✅ Sync to HuggingFace Space complete"
