name: 🧪 Comprehensive Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - districts
          - systems
          - quick

permissions:
  contents: write
  pull-requests: write

jobs:
  comprehensive-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 🔄 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 🧪 Run Comprehensive Test Suite
        run: |
          echo "🧪 Starting Comprehensive Test Suite"
          python scripts/comprehensive_test_runner.py
        continue-on-error: true
      
      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: data/monitoring/test_results.json
          retention-days: 30
      
      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'data/monitoring/test_results.json';
            
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const summary = results.summary;
              
              const comment = `
              ## 🧪 Test Results
              
              **Summary:**
              - Total Tests: ${summary.total_tests}
              - ✅ Passed: ${summary.passed}
              - ❌ Failed: ${summary.failed}
              - ⏭️ Skipped: ${summary.skipped}
              - 📊 Success Rate: ${summary.success_rate}%
              
              ${summary.failed > 0 ? '⚠️ Some tests failed. Review the details.' : '✅ All tests passed!'}
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
      
      - name: 🎯 Generate Test Badge
        run: |
          mkdir -p .github/badges
          python -c "
          import json
          try:
              with open('data/monitoring/test_results.json', 'r') as f:
                  results = json.load(f)
              success_rate = results['summary']['success_rate']
              color = 'green' if success_rate >= 80 else 'yellow' if success_rate >= 60 else 'red'
              badge = f'![Tests](https://img.shields.io/badge/tests-{success_rate}%25-{color})'
              print(badge)
          except:
              print('![Tests](https://img.shields.io/badge/tests-unknown-lightgrey)')
          "
