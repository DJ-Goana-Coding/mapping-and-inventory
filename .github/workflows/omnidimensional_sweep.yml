name: 🧹 Omnidimensional Sweep

on:
  push:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      action:
        description: 'Sweep action'
        required: false
        default: 'scan'
        type: choice
        options:
          - scan
          - scan-and-clean
          - full-audit

permissions:
  contents: write
  issues: write

jobs:
  omnidimensional-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 🔄 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for thorough scanning
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 🧹 Run Omnidimensional Sweep
        run: |
          echo "🧹 Starting Omnidimensional Sweep"
          python scripts/omnidimensional_sweep.py
      
      - name: 📊 Upload Sweep Results
        uses: actions/upload-artifact@v4
        with:
          name: sweep-results
          path: |
            data/monitoring/omnidimensional_sweep.json
            data/security/quarantine/
          retention-days: 90
      
      - name: 🚨 Check for Critical Issues
        id: check_issues
        run: |
          if [ -f data/monitoring/omnidimensional_sweep.json ]; then
            infected=$(python -c "import json; data=json.load(open('data/monitoring/omnidimensional_sweep.json')); print(data['summary']['infected_files'])")
            echo "infected=$infected" >> $GITHUB_OUTPUT
            
            if [ "$infected" -gt "0" ]; then
              echo "⚠️ CRITICAL: $infected infected files detected!"
              echo "critical=true" >> $GITHUB_OUTPUT
            else
              echo "✅ No infected files detected"
              echo "critical=false" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: 🐛 Create Issue for Critical Findings
        if: steps.check_issues.outputs.critical == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('data/monitoring/omnidimensional_sweep.json', 'utf8'));
            
            const title = `🚨 SECURITY ALERT: ${results.summary.infected_files} Infected Files Detected`;
            const body = `
            ## 🧹 Omnidimensional Sweep - Critical Findings
            
            **Timestamp:** ${results.timestamp}
            
            ### Summary
            - 🦠 Infected Files: ${results.summary.infected_files}
            - ⚠️ Suspicious Files: ${results.summary.suspicious_files}
            - 📋 Duplicate Sets: ${results.summary.duplicate_sets}
            - ❌ Missing Artifacts: ${results.summary.missing_artifacts}
            - 📦 Quarantined: ${results.summary.quarantined}
            
            ### Infected Files
            ${results.details.infected_files.map(f => `- \`${f}\``).join('\n')}
            
            ### Recommendations
            ${results.recommendations.map(r => `- ${r}`).join('\n')}
            
            **Action Required:** Review quarantined files immediately.
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'critical', 'automated']
            });
      
      - name: ✅ Success Notification
        if: steps.check_issues.outputs.critical == 'false'
        run: |
          echo "✨ Sweep completed successfully - no critical issues found"
