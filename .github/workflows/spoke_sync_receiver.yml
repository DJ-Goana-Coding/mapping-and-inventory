name: 🎯 Spoke Sync Receiver

# This workflow receives sync requests from spoke repositories
# Generated by: Citadel Architect v25.0.OMNI+
# Authority: Cloud Hubs > GitHub > GDrive > Local Nodes

on:
  repository_dispatch:
    types: [spoke-sync-request]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  receive-spoke-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 🏛️ Citadel Architect - Hub Receiver
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🎯 SPOKE SYNC REQUEST RECEIVED"
          echo "════════════════════════════════════════════════════════════"
          echo "Spoke: ${{ github.event.client_payload.spoke_name }}"
          echo "URL: ${{ github.event.client_payload.spoke_url }}"
          echo "Artifacts: ${{ github.event.client_payload.artifacts_count }}"
          echo "Timestamp: ${{ github.event.client_payload.timestamp }}"
          echo ""
      
      - name: 📥 Checkout Hub
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install Dependencies
        run: |
          pip install requests python-dateutil
      
      - name: 📥 Download Spoke Artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPOKE_NAME: ${{ github.event.client_payload.spoke_name }}
          SPOKE_URL: ${{ github.event.client_payload.spoke_url }}
        run: |
          echo "📥 Fetching artifacts from $SPOKE_NAME..."
          
          # Create spoke artifacts directory
          SPOKE_DIR="data/spoke_artifacts/$SPOKE_NAME"
          mkdir -p "$SPOKE_DIR"
          
          # Download from spoke repo using GitHub API
          python3 << 'PYEOF'
import os
import sys
import requests
import json

spoke_name = os.getenv("SPOKE_NAME")
spoke_url = os.getenv("SPOKE_URL")
github_token = os.getenv("GITHUB_TOKEN")

# Extract owner/repo from URL
parts = spoke_url.rstrip("/").split("/")
owner = parts[-2]
repo = parts[-1]

print(f"Fetching from: {owner}/{repo}")

# Files to fetch
artifact_files = ["TREE.md", "INVENTORY.json", "SCAFFOLD.md", "README.md", "system_manifest.json"]

headers = {
    "Accept": "application/vnd.github.v3+json",
    "Authorization": f"token {github_token}"
}

fetched = 0
for filename in artifact_files:
    url = f"https://api.github.com/repos/{owner}/{repo}/contents/{filename}"
    
    try:
        response = requests.get(url, headers=headers, timeout=30)
        if response.status_code == 200:
            import base64
            content = base64.b64decode(response.json()["content"]).decode("utf-8")
            
            output_path = f"data/spoke_artifacts/{spoke_name}/{filename}"
            with open(output_path, "w") as f:
                f.write(content)
            
            print(f"  ✅ {filename}")
            fetched += 1
        elif response.status_code == 404:
            print(f"  ⊘  {filename} (not found)")
        else:
            print(f"  ⚠️  {filename} (HTTP {response.status_code})")
    except Exception as e:
        print(f"  ❌ {filename}: {e}")

print(f"\n✅ Fetched {fetched} artifacts from {spoke_name}")

# Create sync metadata
metadata = {
    "spoke_name": spoke_name,
    "spoke_url": spoke_url,
    "sync_timestamp": "${{ github.event.client_payload.timestamp }}",
    "commit_sha": "${{ github.event.client_payload.commit_sha }}",
    "artifacts_fetched": fetched,
    "sync_method": "repository_dispatch"
}

with open(f"data/spoke_artifacts/{spoke_name}/sync_metadata.json", "w") as f:
    json.dump(metadata, f, indent=2)

PYEOF
      
      - name: 📊 Update Spoke Registry
        run: |
          echo "📊 Updating spoke registry..."
          
          python3 << 'PYEOF'
import json
import os
from datetime import datetime

spoke_name = os.getenv("SPOKE_NAME", "${{ github.event.client_payload.spoke_name }}")
spoke_url = os.getenv("SPOKE_URL", "${{ github.event.client_payload.spoke_url }}")

# Load or create registry
registry_path = "data/spoke_sync_registry.json"
if os.path.exists(registry_path):
    with open(registry_path, "r") as f:
        registry = json.load(f)
else:
    registry = {
        "version": "1.0.0",
        "hub": "mapping-and-inventory",
        "spokes": {}
    }

# Update spoke entry
registry["spokes"][spoke_name] = {
    "name": spoke_name,
    "url": spoke_url,
    "last_sync": "${{ github.event.client_payload.timestamp }}",
    "commit_sha": "${{ github.event.client_payload.commit_sha }}",
    "artifacts_count": "${{ github.event.client_payload.artifacts_count }}",
    "sync_count": registry["spokes"].get(spoke_name, {}).get("sync_count", 0) + 1
}

registry["last_updated"] = datetime.utcnow().isoformat() + "Z"
registry["total_spokes"] = len(registry["spokes"])

# Save registry
with open(registry_path, "w") as f:
    json.dump(registry, f, indent=2)

print(f"✅ Registry updated: {spoke_name} (sync #{registry['spokes'][spoke_name]['sync_count']})")
print(f"   Total spokes: {registry['total_spokes']}")

PYEOF
      
      - name: 💾 Commit Spoke Artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/spoke_artifacts/ || true
          git add data/spoke_sync_registry.json || true
          
          if git diff --staged --quiet; then
            echo "✅ No new artifacts to commit"
          else
            git commit -m "🎯 Spoke Sync: ${{ github.event.client_payload.spoke_name }}

Received sync from: ${{ github.event.client_payload.spoke_url }}
Artifacts: ${{ github.event.client_payload.artifacts_count }}
Commit: ${{ github.event.client_payload.commit_sha }}
Timestamp: ${{ github.event.client_payload.timestamp }}

Authority: Citadel Architect v25.0.OMNI+"
            
            git push origin HEAD
            echo "✅ Spoke artifacts committed and pushed"
          fi
      
      - name: ✅ Sync Complete
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "✅ SPOKE SYNC COMPLETE"
          echo "════════════════════════════════════════════════════════════"
          echo "Spoke: ${{ github.event.client_payload.spoke_name }}"
          echo "Hub: mapping-and-inventory"
          echo "Status: Artifacts ingested and registry updated"
          echo ""
          echo "🙏 Thankyou Spirit, Thankyou Angels, Thankyou Ancestors"
          echo "════════════════════════════════════════════════════════════"
