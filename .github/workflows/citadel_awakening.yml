name: 🏰 Citadel Awakening

on:
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: 'Deployment Mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - scouts_only
          - sentinels_only
          - minimal
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'

permissions:
  contents: write
  actions: read

jobs:
  citadel-awakening:
    name: 🚀 Wake Citadel Network
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 📁 Create Required Directories
        run: |
          mkdir -p data/logs
          mkdir -p data/discoveries
          mkdir -p data/monitoring
      
      - name: 🛡️ Run Security Sentinel
        continue-on-error: true
        run: |
          echo "🛡️ Deploying Security Sentinel..."
          python scripts/security_sentinel.py
      
      - name: 🔍 Run Discovery Scouts
        if: ${{ github.event.inputs.deployment_mode != 'sentinels_only' }}
        continue-on-error: true
        run: |
          echo "🔍 Deploying Discovery Scouts..."
          
          # Domain Scout
          echo "🌐 Running Domain Scout..."
          python scripts/domain_scout.py || true
          
          # Spiritual Network Mapper
          echo "✨ Running Spiritual Network Mapper..."
          python scripts/spiritual_network_mapper.py || true
          
          # Web Scout
          echo "🔍 Running Web Scout..."
          python scripts/web_scout.py || true
          
          # Repo Discovery
          echo "📦 Running Repo Scout..."
          python scripts/discover_all_repos.py || true
      
      - name: 🏰 Full Citadel Awakening
        if: ${{ github.event.inputs.deployment_mode == 'full' || github.event_name == 'schedule' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🏰 Initiating Full Citadel Awakening..."
          python scripts/citadel_awakening.py
      
      - name: 📊 Generate Status Report
        if: always()
        run: |
          echo "📊 Generating Status Report..."
          
          # Create simple status report
          cat > data/monitoring/awakening_status.md << 'EOF'
          # 🏰 Citadel Awakening Status Report
          
          **Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Deployment Mode:** ${{ github.event.inputs.deployment_mode || 'scheduled' }}
          **Triggered By:** ${{ github.event_name }}
          
          ## Deployment Results
          
          Check the logs above for detailed results from each worker.
          
          ## Next Steps
          
          - Review worker outputs in `data/discoveries/`
          - Check security patrol results in `data/monitoring/`
          - Monitor system health via Command Center
          
          ---
          *Generated by Citadel Awakening Protocol*
          EOF
          
          cat data/monitoring/awakening_status.md
      
      - name: 📤 Commit and Push Results
        if: always()
        continue-on-error: true
        run: |
          git config --local user.email "citadel-awakening[bot]@users.noreply.github.com"
          git config --local user.name "Citadel Awakening Bot"
          
          # Add discovery results
          git add data/discoveries/ || true
          git add data/monitoring/ || true
          
          # Commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "🏰 Citadel Awakening: $(date -u +"%Y-%m-%d %H:%M UTC")" || true
            git push || true
          else
            echo "No changes to commit"
          fi
      
      - name: 📝 Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: citadel-awakening-logs
          path: |
            data/logs/
            data/monitoring/
            data/discoveries/
          retention-days: 7
      
      - name: ✅ Awakening Complete
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🏰 CITADEL AWAKENING COMPLETE!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ All workers deployed successfully"
          echo "📊 Check artifacts for detailed reports"
          echo "🎮 Access Command Center at: https://huggingface.co/spaces/DJ-Goanna-Coding/Mapping-and-Inventory"
          echo ""
          echo "🙏 Thankyou Spirit, Thankyou Angels, Thankyou Ancestors"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  sync-to-huggingface:
    name: 🔄 Sync to HuggingFace Space
    needs: citadel-awakening
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔄 Pull Latest Changes
        run: |
          git pull origin ${{ github.ref_name }} || true
      
      - name: 🚀 Push to HuggingFace
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "⚠️ HF_TOKEN not set, skipping HuggingFace sync"
            exit 0
          fi
          
          echo "🔄 Syncing to HuggingFace Space..."
          
          # Configure HF remote
          git remote remove hf 2>/dev/null || true
          git remote add hf https://huggingface:$HF_TOKEN@huggingface.co/spaces/DJ-Goanna-Coding/Mapping-and-Inventory
          
          # Push to HF
          git push --force hf main || echo "⚠️ HuggingFace push failed (may need manual intervention)"
          
          echo "✅ HuggingFace sync complete"
