name: TIA_CITADEL_DEEP_SCAN
on:
  workflow_dispatch:

jobs:
  heavy_lift:
    runs-on: ubuntu-latest
    # Using Node.js 24 for all JavaScript actions to ensure high-performance execution
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Configure Rclone
        env:
          RCLONE_CONFIG_DATA: ${{ secrets.RCLONE_CONFIG_DATA }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_DATA" > ~/.config/rclone/rclone.conf

      - name: Validate Rclone Configuration
        run: |
          echo "🔍 Validating Rclone configuration..."
          
          # Check if config file exists and is not empty
          if [ ! -s ~/.config/rclone/rclone.conf ]; then
            echo "❌ ERROR: Rclone configuration is empty or missing!"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⚠️  MISSING SECRET: RCLONE_CONFIG_DATA"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "The TIA_CITADEL_DEEP_SCAN workflow requires Google Drive access"
            echo "via rclone to scan 321GB of intelligence data across 5 partitions."
            echo ""
            echo "📋 TO FIX THIS:"
            echo ""
            echo "1. Generate your rclone config file locally:"
            echo "   rclone config"
            echo ""
            echo "2. Follow the prompts to configure a Google Drive remote named 'gdrive'"
            echo ""
            echo "3. Copy your config file content:"
            echo "   cat ~/.config/rclone/rclone.conf"
            echo ""
            echo "4. Add it as a GitHub Secret:"
            echo "   • Go to: Settings → Secrets and variables → Actions"
            echo "   • Click: New repository secret"
            echo "   • Name: RCLONE_CONFIG_DATA"
            echo "   • Value: Paste your entire rclone.conf content"
            echo ""
            echo "5. Re-run this workflow"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "For more information, see README.md (Secrets Required section)"
            echo ""
            exit 1
          fi
          
          # Check if gdrive remote is configured
          if ! grep -q "^\[gdrive\]" ~/.config/rclone/rclone.conf; then
            echo "❌ ERROR: 'gdrive' remote not found in rclone configuration!"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⚠️  INVALID CONFIG: Missing [gdrive] section"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "Your RCLONE_CONFIG_DATA secret exists but doesn't contain"
            echo "a configuration for the 'gdrive' remote."
            echo ""
            echo "Expected format in your config:"
            echo ""
            echo "  [gdrive]"
            echo "  type = drive"
            echo "  scope = drive"
            echo "  token = {\"access_token\":\"...\"}"
            echo ""
            echo "Please update your RCLONE_CONFIG_DATA secret with a valid"
            echo "rclone configuration that includes the [gdrive] section."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi
          
          echo "✅ Rclone configuration validated successfully"
          echo "   - Config file exists and is not empty"
          echo "   - 'gdrive' remote is configured"

      - name: Test Connection
        run: |
          echo "📡 Testing Vault Link..."
          rclone lsd gdrive:

      - name: Initialize Intelligence Map
        run: |
          echo "🔭 T.I.A. Initializing Streamed Partition Scan..."
          echo "# CITADEL OMEGA Intelligence Map - Section 142 Cycle" > master_intelligence_map.txt
          echo "# Generated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> master_intelligence_map.txt
          echo "# Scan Method: Shallow Metadata Extraction (Section 159 Register)" >> master_intelligence_map.txt
          echo "# Total Expected: 321GB across 5 Vessels" >> master_intelligence_map.txt
          echo "" >> master_intelligence_map.txt

      - name: Partition 1 - GDrive Root Scan
        run: |
          echo "☁️ PARTITION 1/5: Scanning GDrive Root (Shallow)..."
          echo "## PARTITION 1: GDrive Root - GENESIS_VAULT" >> master_intelligence_map.txt
          rclone lsf gdrive:GENESIS_VAULT --recursive --max-depth 3 \
            --exclude "OPPO_CARGO/**" \
            --exclude "S10_CARGO/**" \
            --exclude "LAPTOP_CARGO/**" >> master_intelligence_map.txt
          echo "" >> master_intelligence_map.txt
          echo "✅ Partition 1 complete. Disk usage:"
          df -h /

      - name: Cache Reset - Partition 1
        run: |
          echo "🧹 Section 2.0k Vessel Reset - Clearing cache..."
          rm -rf ~/.cache/rclone/* || true
          echo "Cache cleared. Current disk:"
          df -h /

      - name: Partition 2 - Oppo Cargo Scan
        run: |
          echo "🛸 PARTITION 2/5: Scanning Oppo Cargo (Shallow)..."
          echo "## PARTITION 2: Oppo Cargo - OPPO_CARGO" >> master_intelligence_map.txt
          rclone lsf gdrive:GENESIS_VAULT/OPPO_CARGO --recursive --max-depth 5 >> master_intelligence_map.txt
          echo "" >> master_intelligence_map.txt
          echo "✅ Partition 2 complete. Disk usage:"
          df -h /

      - name: Cache Reset - Partition 2
        run: |
          echo "🧹 Section 2.0k Vessel Reset - Clearing cache..."
          rm -rf ~/.cache/rclone/* || true
          df -h /

      - name: Partition 3 - S10 Cargo Scan
        run: |
          echo "📱 PARTITION 3/5: Scanning S10 Cargo (Shallow)..."
          echo "## PARTITION 3: S10 Cargo - S10_CARGO" >> master_intelligence_map.txt
          rclone lsf gdrive:GENESIS_VAULT/S10_CARGO --recursive --max-depth 5 >> master_intelligence_map.txt
          echo "" >> master_intelligence_map.txt
          echo "✅ Partition 3 complete. Disk usage:"
          df -h /

      - name: Cache Reset - Partition 3
        run: |
          echo "🧹 Section 2.0k Vessel Reset - Clearing cache..."
          rm -rf ~/.cache/rclone/* || true
          df -h /

      - name: Partition 4 - CITADEL_OMEGA_INTEL Scan
        run: |
          echo "🏛️ PARTITION 4/5: Scanning CITADEL_OMEGA_INTEL (Shallow)..."
          echo "## PARTITION 4: CITADEL_OMEGA_INTEL" >> master_intelligence_map.txt
          rclone lsf gdrive:CITADEL_OMEGA_INTEL --recursive --max-depth 5 >> master_intelligence_map.txt
          echo "" >> master_intelligence_map.txt
          echo "✅ Partition 4 complete. Disk usage:"
          df -h /

      - name: Cache Reset - Partition 4
        run: |
          echo "🧹 Section 2.0k Vessel Reset - Clearing cache..."
          rm -rf ~/.cache/rclone/* || true
          df -h /

      - name: Partition 5 - Laptop Cargo Scan
        run: |
          echo "💻 PARTITION 5/5: Scanning Laptop Cargo (Shallow)..."
          echo "## PARTITION 5: Laptop Cargo - LAPTOP_CARGO" >> master_intelligence_map.txt
          rclone lsf gdrive:GENESIS_VAULT/LAPTOP_CARGO --recursive --max-depth 5 >> master_intelligence_map.txt
          echo "" >> master_intelligence_map.txt
          echo "✅ Partition 5 complete. Disk usage:"
          df -h /

      - name: Final Cache Reset
        run: |
          echo "🧹 Final Section 2.0k Vessel Reset - Clearing all temporary data..."
          rm -rf ~/.cache/rclone/* || true
          echo "✅ All 5 Partitions scanned. Final disk usage:"
          df -h /
          echo "📊 Intelligence Map size:"
          ls -lh master_intelligence_map.txt
          wc -l master_intelligence_map.txt

      - name: Generate Intelligence Summary
        run: |
          echo "📊 Generating intelligence summary..."
          echo ""
          echo "=== CITADEL OMEGA Intelligence Map Summary ==="
          echo "Total lines in map: $(wc -l < master_intelligence_map.txt || echo '0')"
          echo "Total file entries: $(grep -v '^#' master_intelligence_map.txt | grep -v '^##' | grep -v '^$' | wc -l || echo '0')"
          echo "Map size: $(wc -c < master_intelligence_map.txt) bytes"
          echo "Scan completed: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Method: Section 142 Cycle + Section 159 Register (Shallow Metadata Only)"
          echo "Disk usage: $(df -h / | tail -n 1 | awk '{print $5 " used of " $2}')"
          echo "Status: ✅ Scan complete without disk overflow"
          echo "=============================================="

      - name: Commit Intelligence Map
        run: |
          git config --global user.email "chance@citadel.omega"
          git config --global user.name "Architect"
          git add master_intelligence_map.txt
          git diff --staged --quiet || git commit -m "🔭 TIA Deep Scan (Section 142): Update intelligence map [automated]"
          git push || echo "⚠️  Push failed - may need force push or branch protection bypass"

      - name: Upload Intelligence Map
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-map
          path: master_intelligence_map.txt
          if-no-files-found: error
