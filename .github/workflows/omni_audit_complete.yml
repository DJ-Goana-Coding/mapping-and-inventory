name: 🔥 CITADEL OMNI-AUDIT COMPLETE v25.0.OMNI++
# Complete systems audit with 10-solution generation, shopping, testing, and validation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # Complete cycle
          - audit         # Audit only
          - solutions     # Audit + solutions
          - shopping      # Deploy shoppers
          - test          # Continuous testing
          - validate      # Coverage validation
  
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  audit:
    name: 🔍 Master Audit
    runs-on: ubuntu-latest
    if: |
      contains(fromJSON('["full", "audit", "solutions"]'), github.event.inputs.mode) ||
      github.event.schedule
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt || true
      
      - name: Master Systems Audit
        run: python scripts/master_systems_auditor.py
        continue-on-error: true
      
      - uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: data/audits/

  solutions:
    name: 🔮 10 Solutions
    runs-on: ubuntu-latest
    needs: audit
    if: |
      contains(fromJSON('["full", "solutions"]'), github.event.inputs.mode) ||
      github.event.schedule
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt || true
      - uses: actions/download-artifact@v4
        with:
          name: audit-results
          path: data/audits/
      
      - name: Generate Solutions
        run: python scripts/ten_solution_generator.py
        continue-on-error: true
      
      - uses: actions/upload-artifact@v4
        with:
          name: solutions-results
          path: data/solutions/

  shopping:
    name: 🛒 Shopping
    runs-on: ubuntu-latest
    needs: solutions
    if: |
      contains(fromJSON('["full", "shopping"]'), github.event.inputs.mode) ||
      github.event.schedule
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt || true
      
      - name: Shopping Expedition
        run: python scripts/shopping_expedition_orchestrator.py
        timeout-minutes: 30
        continue-on-error: true
      
      - uses: actions/upload-artifact@v4
        with:
          name: shopping-results
          path: data/shopping/

  test:
    name: 🔄 Testing
    runs-on: ubuntu-latest
    needs: shopping
    if: |
      contains(fromJSON('["full", "test"]'), github.event.inputs.mode) ||
      github.event.schedule
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt || true
      - uses: actions/download-artifact@v4
      
      - name: Continuous Testing
        run: python scripts/continuous_testing_engine.py
        timeout-minutes: 60
        continue-on-error: true
      
      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: data/improvements/

  validate:
    name: ✅ Validation
    runs-on: ubuntu-latest
    needs: test
    if: |
      contains(fromJSON('["full", "validate"]'), github.event.inputs.mode) ||
      github.event.schedule
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt || true
      
      - name: Coverage Validation
        run: python scripts/coverage_validator.py
        continue-on-error: true
      
      - uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: data/validation/

  commit:
    name: 💾 Commit
    runs-on: ubuntu-latest
    needs: validate
    if: success()
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      
      - uses: actions/download-artifact@v4
      
      - name: Commit Results
        run: |
          mkdir -p data/{audits,solutions,shopping,improvements,validation}
          [ -d audit-results ] && cp -r audit-results/* data/audits/ || true
          [ -d solutions-results ] && cp -r solutions-results/* data/solutions/ || true
          [ -d shopping-results ] && cp -r shopping-results/* data/shopping/ || true
          [ -d test-results ] && cp -r test-results/* data/improvements/ || true
          [ -d validation-results ] && cp -r validation-results/* data/validation/ || true
          
          git config user.email "citadel[bot]@noreply.github.com"
          git config user.name "Citadel Omni-Audit"
          git add data/
          git commit -m "🔥 Omni-Audit Complete: $(date -u +"%Y-%m-%d %H:%M UTC")" || true
          git push
