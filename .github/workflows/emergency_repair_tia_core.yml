name: 🚨 Emergency Repair TIA-ARCHITECT-CORE Space

# ═══════════════════════════════════════════════════════════════════
# Emergency TIA-ARCHITECT-CORE Space Repair Workflow
# ═══════════════════════════════════════════════════════════════════
# Purpose: Direct push to HuggingFace Space to fix Python 3.13 build
# Target: DJ-Goanna-Coding/TIA-ARCHITECT-CORE (HuggingFace Space)
# Issue: Invalid streamlit version, numpy compilation timeout
# Fix: Apply tia-architect-core-templates/requirements.txt directly
# ═══════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show changes without pushing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  emergency-repair:
    name: 🚨 Emergency Repair to HuggingFace Space
    runs-on: ubuntu-latest
    
    steps:
      - name: 🧩 Checkout mapping-and-inventory
        uses: actions/checkout@v4
        
      - name: 🔍 Verify Template Exists
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          echo "🔍 VERIFYING PYTHON 3.13 COMPATIBLE TEMPLATE"
          echo "═══════════════════════════════════════════════════════════════════"
          
          TEMPLATE_FILE="tia-architect-core-templates/requirements.txt"
          
          if [ ! -f "$TEMPLATE_FILE" ]; then
            echo "❌ ERROR: Template not found at $TEMPLATE_FILE"
            exit 1
          fi
          
          echo "✅ Template found"
          echo ""
          echo "📋 Key packages in template:"
          grep -E "(streamlit|setuptools|pandas|numpy|requests)" "$TEMPLATE_FILE" | head -6
          echo ""
          
          # Verify critical packages
          for pkg in "setuptools>=75.0.0" "streamlit>=1.42.0" "pandas>=2.2.0" "numpy>=2.0.0"; do
            if ! grep -q "$pkg" "$TEMPLATE_FILE"; then
              echo "❌ ERROR: Template missing required package: $pkg"
              exit 1
            fi
          done
          
          echo "✅ All critical packages verified"
          echo ""
          
      - name: 📥 Clone TIA-ARCHITECT-CORE Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          echo "📥 CLONING HUGGINGFACE SPACE"
          echo "═══════════════════════════════════════════════════════════════════"
          
          # Create work directory
          WORK_DIR="/tmp/tia-core-repair"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"
          
          # Clone from HuggingFace Space
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ ERROR: HF_TOKEN secret not set"
            echo "   Please add HF_TOKEN to repository secrets"
            exit 1
          fi
          
          echo "Cloning from HuggingFace Space..."
          git clone https://x-access-token:${HF_TOKEN}@huggingface.co/spaces/DJ-Goanna-Coding/TIA-ARCHITECT-CORE
          
          echo "✅ Space cloned successfully"
          echo ""
          
      - name: 💾 Backup & Deploy Template
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          echo "💾 BACKING UP & DEPLOYING TEMPLATES"
          echo "═══════════════════════════════════════════════════════════════════"
          
          cd /tmp/tia-core-repair/TIA-ARCHITECT-CORE
          
          # Configure git
          git config user.name "Citadel Architect"
          git config user.email "architect@citadel.mesh"
          
          # Backup existing files
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          for file in requirements.txt app.py README.md; do
            if [ -f "$file" ]; then
              BACKUP_FILE="${file}.backup.${TIMESTAMP}"
              echo "Backing up $file to: $BACKUP_FILE"
              cp "$file" "$BACKUP_FILE"
              git add "$BACKUP_FILE"
            fi
          done
          
          echo ""
          echo "📋 Deploying templates..."
          
          # Copy all templates
          TEMPLATE_DIR="${GITHUB_WORKSPACE}/tia-architect-core-templates"
          
          cp "$TEMPLATE_DIR/requirements.txt" requirements.txt
          cp "$TEMPLATE_DIR/app.py" app.py
          
          # For README.md, we need to create HF Space version with frontmatter
          cat > README.md << 'EOF'
---
title: TIA-ARCHITECT-CORE
emoji: 🧠
colorFrom: blue
colorTo: purple
sdk: streamlit
sdk_version: 1.42.0
app_file: app.py
pinned: false
license: mit
---

# 🧠 TIA-ARCHITECT-CORE

**Sovereign AI Oracle & RAG System**

## Overview

TIA-ARCHITECT-CORE is the central reasoning hub for the Citadel Mesh.

### Features

- 🔮 Oracle Reasoning Engine
- 📚 RAG Knowledge Base (FAISS + sentence-transformers)
- 🗺️ District Topology Mapping (D01-D12)
- ⚙️ System Orchestration

### Auto-Deployed

This Space syncs from: https://github.com/DJ-Goana-Coding/mapping-and-inventory

### Configuration

- SDK: Streamlit (auto port 8501)
- Python: 3.13
- Entry: app.py
- Health: /_stcore/health (automatic)

### Quick Links

- [GitHub Repo](https://github.com/DJ-Goana-Coding/mapping-and-inventory)
- [Repair Guide](https://github.com/DJ-Goana-Coding/mapping-and-inventory/blob/main/TIA_ARCHITECT_CORE_REPAIR_GUIDE.md)
- [503 Error Fix](https://github.com/DJ-Goana-Coding/mapping-and-inventory/blob/main/TIA_CORE_503_ERROR_FIX.md)

---

**Version:** v25.0.OMNI  
**Status:** ✅ Operational  
**Weld. Pulse. Ignite.** 🔥
EOF
          
          echo "✅ All templates deployed"
          echo ""
          
          # Show what was deployed
          echo "📊 Deployed files:"
          ls -lh requirements.txt app.py README.md
          echo ""
          
      - name: 💾 Commit Changes
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          echo "💾 COMMITTING CHANGES"
          echo "═══════════════════════════════════════════════════════════════════"
          
          cd /tmp/tia-core-repair/TIA-ARCHITECT-CORE
          
          git add requirements.txt app.py README.md
          
          # Check if there are changes
          if git diff --cached --quiet; then
            echo "ℹ️  No changes detected - Space already up to date"
            echo "already_updated=true" >> $GITHUB_ENV
            exit 0
          fi
          
          # Commit changes
          git commit -m "🔧 EMERGENCY FIX: Complete TIA-ARCHITECT-CORE deployment

ROOT CAUSE ANALYSIS:
1. Build Failure (Fixed):
   - streamlit==1.56.0 (INVALID - version doesn't exist)
   - numpy==1.26.4 (compiling from source, 15+ min timeout)
   - Missing setuptools causing pkg_resources errors

2. 503 Error (Fixed):
   - Root=1-69cfb1bf-799ca1f56f65eaa20f98606b trace ID
   - Missing or incorrect app.py entrypoint
   - Port/health check misconfiguration

COMPREHENSIVE FIX APPLIED:

✅ requirements.txt (Python 3.13 compatible):
   - streamlit>=1.42.0 (valid version)
   - numpy>=2.0.0 (prebuilt wheels)
   - pandas>=2.2.0 (Python 3.13 support)
   - setuptools>=75.0.0 (explicit)
   
✅ app.py (Minimal working Streamlit app):
   - Multi-tab interface (Oracle, RAG, Districts, System)
   - Proper health check support
   - No custom port config (SDK auto-managed on 8501)
   
✅ README.md (HuggingFace Space config):
   - Frontmatter: sdk: streamlit, app_file: app.py
   - Proper metadata for auto health checks
   - Documentation and quick links

EXPECTED OUTCOME:
- Build completes in ~2 minutes (was timing out at 15+ min)
- All packages install from wheels (no compilation)
- Space starts on port 8501 with health check
- No 503 error / trace ID
- Streamlit interface loads correctly

Deployed by: Emergency repair workflow (GitHub Actions)
Template source: mapping-and-inventory/tia-architect-core-templates/
Authority: GitHub > HF Spaces (Core Directive #1)
Fixes: Build timeout + 503 error (Root=1-xxx)

Weld. Pulse. Ignite."
          
          echo "✅ Changes committed"
          echo "already_updated=false" >> $GITHUB_ENV
          echo ""
          
      - name: ⬆️ Push to HuggingFace Space
        if: github.event.inputs.dry_run != 'true' && env.already_updated != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          echo "⬆️  PUSHING TO HUGGINGFACE SPACE"
          echo "═══════════════════════════════════════════════════════════════════"
          
          cd /tmp/tia-core-repair/TIA-ARCHITECT-CORE
          
          # Push to HuggingFace
          git push origin main
          
          echo "✅ Pushed to HuggingFace Space"
          echo ""
          
      - name: 📋 Dry Run Summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          echo "🔍 DRY RUN COMPLETE (no changes pushed)"
          echo "═══════════════════════════════════════════════════════════════════"
          echo ""
          echo "The following changes would be applied to HuggingFace Space:"
          cd /tmp/tia-core-repair/TIA-ARCHITECT-CORE
          git show HEAD
          echo ""
          
      - name: ✅ Success Summary
        if: github.event.inputs.dry_run != 'true' && env.already_updated != 'true'
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          echo "✅ EMERGENCY REPAIR COMPLETE"
          echo "═══════════════════════════════════════════════════════════════════"
          echo ""
          echo "🎯 TIA-ARCHITECT-CORE Space repair deployed successfully"
          echo ""
          echo "📋 Next Steps:"
          echo ""
          echo "   1. Monitor HuggingFace Space rebuild (auto-triggered):"
          echo "      https://huggingface.co/spaces/DJ-Goanna-Coding/TIA-ARCHITECT-CORE/logs"
          echo ""
          echo "   2. Expected in build logs within ~3-5 minutes:"
          echo "      ✅ Successfully installed setuptools-75.x.x"
          echo "      ✅ Successfully installed streamlit-1.4x.x"
          echo "      ✅ Successfully installed pandas-2.2.x"
          echo "      ✅ Successfully installed numpy-2.x.x (wheel, not tar.gz)"
          echo "      ✅ Running on local URL: http://0.0.0.0:7860"
          echo ""
          echo "   3. Verify Space accessibility (should be live in ~5-8 minutes):"
          echo "      https://huggingface.co/spaces/DJ-Goanna-Coding/TIA-ARCHITECT-CORE"
          echo ""
          echo "   4. Build time comparison:"
          echo "      Before: 31s cache + 15+ min numpy compilation (TIMEOUT)"
          echo "      After:  31s cache + ~90s pip install = ~2 minutes total ✅"
          echo ""
          echo "🔧 Template: tia-architect-core-templates/requirements.txt"
          echo "📡 Target: HuggingFace Space (DJ-Goanna-Coding/TIA-ARCHITECT-CORE)"
          echo "🔗 Double-N Rift: GitHub org uses single 'n', HF uses double 'nn'"
          echo ""
          echo "Weld. Pulse. Ignite. 🔥"
          echo ""
          
      - name: 🔔 Already Updated Summary
        if: env.already_updated == 'true'
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          echo "ℹ️  SPACE ALREADY UP TO DATE"
          echo "═══════════════════════════════════════════════════════════════════"
          echo ""
          echo "The TIA-ARCHITECT-CORE Space already has the correct requirements.txt"
          echo ""
          echo "If Space is still failing, check:"
          echo "   1. Space logs for different error: "
          echo "      https://huggingface.co/spaces/DJ-Goanna-Coding/TIA-ARCHITECT-CORE/logs"
          echo ""
          echo "   2. Try Factory Reboot in Space settings"
          echo ""
          echo "   3. Check if there are other files causing issues (Dockerfile, app.py, etc.)"
          echo ""
