name: 🌐 Web Platform Orchestrator
# Master workflow for MODULAR WEB PLATFORM OMNISTRATEGY

on:
  workflow_dispatch:
    inputs:
      mission:
        description: 'Mission to execute'
        required: true
        type: choice
        options:
          - 'full_discovery'
          - 'frontend_only'
          - 'backend_only'
          - 'web3_only'
          - 'multimedia_only'
          - 'laptop_scan'
          - 'all_scouts'
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday 8 AM UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    name: Web Platform Discovery Orchestration
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Create output directories
        run: |
          mkdir -p data/agent_requisitions
          mkdir -p data/laptop_assets
          mkdir -p data/discoveries
      
      - name: Run Frontend Stack Scout
        if: ${{ github.event.inputs.mission == 'full_discovery' || github.event.inputs.mission == 'frontend_only' || github.event.inputs.mission == 'all_scouts' }}
        run: |
          echo "🎨 Running Frontend Stack Scout..."
          python scripts/frontend_stack_scout.py
      
      - name: Run Backend API Scout
        if: ${{ github.event.inputs.mission == 'full_discovery' || github.event.inputs.mission == 'backend_only' || github.event.inputs.mission == 'all_scouts' }}
        run: |
          echo "⚙️ Running Backend API Scout..."
          python scripts/backend_api_scout.py
      
      - name: Run Web3 Integration Scout
        if: ${{ github.event.inputs.mission == 'full_discovery' || github.event.inputs.mission == 'web3_only' || github.event.inputs.mission == 'all_scouts' }}
        run: |
          echo "🌐 Running Web3 Integration Scout..."
          python scripts/web3_integration_scout.py
      
      - name: Run Multimedia Production Scout
        if: ${{ github.event.inputs.mission == 'full_discovery' || github.event.inputs.mission == 'multimedia_only' || github.event.inputs.mission == 'all_scouts' }}
        run: |
          echo "🎬 Running Multimedia Production Scout..."
          python scripts/multimedia_production_scout.py
      
      - name: Run Domain DNS Scout
        if: ${{ github.event.inputs.mission == 'full_discovery' || github.event.inputs.mission == 'all_scouts' }}
        run: |
          echo "🌐 Running Domain DNS Scout..."
          python scripts/domain_dns_scout.py
      
      - name: Run Realtime Communication Scout
        if: ${{ github.event.inputs.mission == 'full_discovery' || github.event.inputs.mission == 'all_scouts' }}
        run: |
          echo "📡 Running Realtime Communication Scout..."
          python scripts/realtime_comm_scout.py
      
      - name: Run AI/ML Infrastructure Scout
        if: ${{ github.event.inputs.mission == 'full_discovery' || github.event.inputs.mission == 'all_scouts' }}
        run: |
          echo "🤖 Running AI/ML Infrastructure Scout..."
          python scripts/ai_ml_infrastructure_scout.py
      
      - name: Run Security & Compliance Scout
        if: ${{ github.event.inputs.mission == 'full_discovery' || github.event.inputs.mission == 'all_scouts' }}
        run: |
          echo "🔒 Running Security & Compliance Scout..."
          python scripts/security_compliance_scout.py
      
      - name: Run Laptop Asset Vacuum
        if: ${{ github.event.inputs.mission == 'laptop_scan' || github.event.inputs.mission == 'full_discovery' }}
        run: |
          echo "💻 Running Laptop Asset Vacuum..."
          python scripts/laptop_asset_vacuum.py
      
      - name: Generate Discovery Report
        run: |
          echo "📊 Generating Discovery Report..."
          cat > data/agent_requisitions/DISCOVERY_REPORT.md << 'EOF'
          # 🌐 WEB PLATFORM DISCOVERY REPORT
          
          **Generated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Mission**: ${{ github.event.inputs.mission || 'scheduled' }}
          
          ## 📦 Discoveries Generated
          
          EOF
          
          ls -lh data/agent_requisitions/*.json 2>/dev/null | awk '{print "- `" $9 "` - " $5}' >> data/agent_requisitions/DISCOVERY_REPORT.md || echo "No JSON files generated yet" >> data/agent_requisitions/DISCOVERY_REPORT.md
          
          echo "" >> data/agent_requisitions/DISCOVERY_REPORT.md
          echo "## 🎯 Next Steps" >> data/agent_requisitions/DISCOVERY_REPORT.md
          echo "" >> data/agent_requisitions/DISCOVERY_REPORT.md
          echo "1. Review discovery files in \`data/agent_requisitions/\`" >> data/agent_requisitions/DISCOVERY_REPORT.md
          echo "2. Select technologies for implementation" >> data/agent_requisitions/DISCOVERY_REPORT.md
          echo "3. Create deployment workflows" >> data/agent_requisitions/DISCOVERY_REPORT.md
          echo "4. Begin modular platform construction" >> data/agent_requisitions/DISCOVERY_REPORT.md
          
          cat data/agent_requisitions/DISCOVERY_REPORT.md
      
      - name: Commit discoveries
        run: |
          git config user.name "Web Platform Orchestrator"
          git config user.email "orchestrator@citadel.local"
          git add data/agent_requisitions/ data/laptop_assets/ || true
          git diff --staged --quiet || git commit -m "🌐 Web Platform Discovery: ${{ github.event.inputs.mission || 'scheduled' }}"
          git push || echo "No changes to push"
      
      - name: Create summary
        run: |
          echo "## 🎯 Web Platform Discovery Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mission**: ${{ github.event.inputs.mission || 'scheduled' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Discoveries:" >> $GITHUB_STEP_SUMMARY
          find data/agent_requisitions -name "*.json" -type f | while read file; do
            echo "- \`$(basename $file)\`" >> $GITHUB_STEP_SUMMARY
          done
