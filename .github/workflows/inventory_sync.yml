name: "Inventory Sync — Fleet Manifest & README Index"

# ── Triggers ─────────────────────────────────────────────────────────────────
on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      skip_readme_index:
        description: "Skip README indexing step (faster run)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to commit & push manifest updates

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  inventory-sync:
    name: "Fleet Manifest Sync"
    runs-on: ubuntu-latest

    env:
      # The Personal Access Token is injected from GitHub Secrets.
      # It must have at minimum: repo (read) scope.
      GITHUB_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          # Fetch full history so git log works correctly when committing back
          fetch-depth: 0
          # Use the PAT so the push step below can write back to the branch
          token: ${{ secrets.GH_PAT || github.token }}

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: "Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Install dependencies"
        run: |
          pip install --quiet --upgrade pip
          if [ -f requirements.txt ]; then
            pip install --quiet -r requirements.txt || echo "⚠️  Some requirements failed to install (non-fatal for harvester/indexer)"
          fi

      # ── 3. Harvest — Global Repository Manifest (Tasks 1–3) ────────────────
      - name: "Harvest — build fleet_manifest.json"
        run: python -m agents.repo_harvester
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # ── 4. README Index — Knowledge Extraction (Task 5) ────────────────────
      - name: "Index READMEs — populate District_05 readme_index"
        if: ${{ github.event.inputs.skip_readme_index != 'true' }}
        run: python -m agents.readme_indexer
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # ── 5. Verify re-connectivity (Task 4) ─────────────────────────────────
      - name: "Verify linked repositories"
        run: |
          python - <<'EOF'
          import json, pathlib, urllib.request, urllib.error, os, sys, re

          token = os.environ.get("GITHUB_TOKEN", "")
          manifest_path = pathlib.Path("fleet_manifest.json")
          audit_log = open("sync_audit.log", "a", encoding="utf-8")

          if not manifest_path.exists():
              print("⚠️  fleet_manifest.json not found — skipping verification.")
              audit_log.write("[verify] fleet_manifest.json missing\n")
              sys.exit(0)

          with manifest_path.open(encoding="utf-8") as fh:
              manifest = json.load(fh)

          repos = manifest.get("repositories", [])
          ok, unreachable = 0, []

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "mapping-and-inventory/inventory-sync",
          }

          # Credential-pattern scrubber (mirrors agents/repo_harvester._SENSITIVE_PATTERNS)
          _SENSITIVE = [
              re.compile(r"(?i)(api[_\s-]?key|token|secret|password|passw?d|auth)\s*[:=]\s*\S+"),
              re.compile(r"ghp_[A-Za-z0-9]{36,}"),
              re.compile(r"sk-[A-Za-z0-9]{32,}"),
          ]

          def _sanitize(text):
              if not text:
                  return ""
              for p in _SENSITIVE:
                  text = p.sub("<REDACTED>", text)
              return text.strip()

          for repo in repos:
              full_name = repo.get("full_name", "")
              url = f"https://api.github.com/repos/{full_name}"
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read().decode())
                      # Refresh live metadata — sanitize description before storing
                      repo["description"] = _sanitize(data.get("description") or "")
                      repo["language"] = data.get("language") or ""
                      repo["updated_at"] = data.get("updated_at", repo.get("updated_at", ""))
                      ok += 1
              except urllib.error.HTTPError as exc:
                  unreachable.append((full_name, str(exc.code)))
                  audit_log.write(f"[verify] UNREACHABLE {full_name}: HTTP {exc.code}\n")
              except Exception as exc:
                  unreachable.append((full_name, str(exc)))
                  audit_log.write(f"[verify] ERROR {full_name}: {exc}\n")

          audit_log.write(f"[verify] {ok} ok, {len(unreachable)} unreachable\n")
          audit_log.close()

          # Write updated manifest back
          import datetime
          manifest["generated_utc"] = datetime.datetime.now(datetime.timezone.utc).isoformat()
          with manifest_path.open("w", encoding="utf-8") as fh:
              json.dump(manifest, fh, indent=2)

          print(f"✅ Verification: {ok} reachable, {len(unreachable)} unreachable.")
          if unreachable:
              for name, err in unreachable:
                  print(f"  ⚠️  {name}: {err}")
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # ── 6. Refresh internal dependency graph (Task 4) ──────────────────────
      - name: "Refresh dependency graph — brain/dependency_graph.json"
        run: python -m agents.dependency_scanner

      # ── 7. Commit & push updates ────────────────────────────────────────────
      - name: "Commit manifest updates"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all changed/new inventory artefacts
          git add fleet_manifest.json sync_audit.log \
                  brain/dependency_graph.json \
                  District_05_OPEN_SOURCE_BIN/readme_index/ || true

          if git diff --cached --quiet; then
            echo "ℹ️  No manifest changes detected — nothing to commit."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore(inventory): auto-sync fleet manifest [${TIMESTAMP}]"
            git push
            echo "✅ Manifest update committed and pushed."
          fi
