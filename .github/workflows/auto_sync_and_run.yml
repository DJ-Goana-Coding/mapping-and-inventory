name: Auto Sync and Run All Workflows

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_workflows:
        description: 'Run all workflows after sync'
        required: false
        default: 'true'
        type: boolean
      merge_to_main:
        description: 'Auto-merge branches to main (if eligible)'
        required: false
        default: 'false'
        type: boolean

jobs:
  auto_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Pull latest from main
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📥 Pulling latest changes from main branch"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          git fetch origin main
          git checkout main
          git pull origin main
          
          echo "✅ Main branch synchronized"
      
      - name: Check for open PRs eligible for auto-merge
        if: github.event.inputs.merge_to_main == 'true' || github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Checking for open PRs eligible for auto-merge"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # List all open PRs
          gh pr list --state open --json number,title,headRefName,mergeable,statusCheckRollup \
            --jq '.[] | "\(.number) \(.title) [\(.headRefName)] - Mergeable: \(.mergeable)"'
          
          # Note: Auto-merge is intentionally conservative
          # PRs must have:
          # - All status checks passing
          # - No merge conflicts
          # - At least one approval (if required)
          
          echo ""
          echo "ℹ️  Auto-merge is disabled by default for safety"
          echo "    Enable manually or add auto-merge labels to PRs"
      
      - name: Trigger all workflows
        if: github.event.inputs.run_workflows != 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Triggering all workflows"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Workflow 1: TIA_CITADEL_DEEP_SCAN
          echo "📡 Triggering TIA_CITADEL_DEEP_SCAN..."
          gh workflow run tia_citadel_deep_scan.yml --ref main && \
            echo "✅ TIA_CITADEL_DEEP_SCAN triggered" || \
            echo "⚠️  TIA_CITADEL_DEEP_SCAN trigger failed (may need secrets)"
          echo ""
          
          # Workflow 2: S10_PUSH_TO_VAULT
          echo "📱 Triggering S10_PUSH_TO_VAULT..."
          gh workflow run s10_push_to_vault.yml --ref main \
            -f sync_intel=true \
            -f sync_cargo=true && \
            echo "✅ S10_PUSH_TO_VAULT triggered" || \
            echo "⚠️  S10_PUSH_TO_VAULT trigger failed (may need secrets)"
          echo ""
          
          # Workflow 3: sync_to_hf.yml
          echo "🤗 Triggering Sync to HuggingFace Space..."
          gh workflow run sync_to_hf.yml --ref main && \
            echo "✅ Sync to HuggingFace triggered" || \
            echo "⚠️  Sync to HuggingFace trigger failed (may need secrets)"
          echo ""
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All workflows triggered successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      
      - name: Monitor workflow status
        if: github.event.inputs.run_workflows != 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Recent workflow runs:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          gh run list --limit 5
          echo ""
          echo "💡 To monitor workflow progress:"
          echo "   gh run list"
          echo "   gh run watch <run-id>"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
