name: Mesh Heartbeat
# CITADEL GRAND UNIFICATION - Phase 1.3: Continuous Health Monitoring
# Monitors health of all repositories, workflows, and connections

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  heartbeat:
    name: System Heartbeat Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Check GitHub API Health
        id: github_health
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          echo "🔍 Checking GitHub API health..."
          response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/rate_limit)
          
          remaining=$(echo "$response" | jq -r '.rate.remaining')
          limit=$(echo "$response" | jq -r '.rate.limit')
          
          echo "remaining=$remaining" >> $GITHUB_OUTPUT
          echo "limit=$limit" >> $GITHUB_OUTPUT
          
          if [ "$remaining" -lt 100 ]; then
            echo "⚠️ GitHub rate limit low: $remaining/$limit"
            echo "status=warning" >> $GITHUB_OUTPUT
          else
            echo "✅ GitHub rate limit healthy: $remaining/$limit"
            echo "status=healthy" >> $GITHUB_OUTPUT
          fi
      
      - name: Check HuggingFace Connectivity
        id: hf_health
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "🔍 Checking HuggingFace connectivity..."
          
          if [ -z "$HF_TOKEN" ]; then
            echo "⚠️ HF_TOKEN not configured"
            echo "status=unconfigured" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          response_code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $HF_TOKEN" https://huggingface.co/api/whoami)
          
          if [ "$response_code" = "200" ]; then
            echo "✅ HuggingFace API healthy"
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "⚠️ HuggingFace API issue (HTTP $response_code)"
            echo "status=degraded" >> $GITHUB_OUTPUT
          fi
      
      - name: Check Repository Health
        id: repo_health
        run: |
          echo "🔍 Checking repository health..."
          
          # Check if critical files exist
          critical_files=(
            "README.md"
            "requirements.txt"
            ".github/workflows/pulse_sync_master.yml"
            "data/discoveries"
            "scripts/citadel_grand_unification"
          )
          
          missing_files=()
          for file in "${critical_files[@]}"; do
            if [ ! -e "$file" ]; then
              missing_files+=("$file")
            fi
          done
          
          if [ ${#missing_files[@]} -eq 0 ]; then
            echo "✅ All critical files present"
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Missing critical files: ${missing_files[*]}"
            echo "status=degraded" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate Heartbeat Report
        run: |
          mkdir -p data/monitoring
          
          cat > data/monitoring/mesh_heartbeat.json << EOF
{
  "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "version": "1.0.0",
  "status": "operational",
  "checks": {
    "github_api": {
      "status": "${{ steps.github_health.outputs.status }}",
      "rate_limit_remaining": ${{ steps.github_health.outputs.remaining || 0 }},
      "rate_limit_total": ${{ steps.github_health.outputs.limit || 5000 }}
    },
    "huggingface_api": {
      "status": "${{ steps.hf_health.outputs.status }}"
    },
    "repository": {
      "status": "${{ steps.repo_health.outputs.status }}"
    }
  },
  "authority_chain": {
    "level_4": "HuggingFace Spaces",
    "level_3": "GitHub Repositories",
    "level_2": "GDrive Metadata",
    "level_1": "Local Nodes"
  },
  "next_heartbeat": "$(date -u -d '+30 minutes' +%Y-%m-%dT%H:%M:%SZ)"
}
EOF
          
          echo "📊 Heartbeat Report:"
          cat data/monitoring/mesh_heartbeat.json
      
      - name: Commit Heartbeat
        run: |
          git config user.name "Citadel Architect"
          git config user.email "citadel@mapping-and-inventory"
          git add data/monitoring/mesh_heartbeat.json
          git diff --staged --quiet || git commit -m "💓 Mesh Heartbeat - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || echo "No changes to push"
      
      - name: Summary
        if: always()
        run: |
          echo "## 💓 Mesh Heartbeat Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### System Health" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub API:** ${{ steps.github_health.outputs.status }} (${{ steps.github_health.outputs.remaining }}/${{ steps.github_health.outputs.limit }} requests)" >> $GITHUB_STEP_SUMMARY
          echo "- **HuggingFace API:** ${{ steps.hf_health.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ steps.repo_health.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Authority Chain" >> $GITHUB_STEP_SUMMARY
          echo "✅ HuggingFace > GitHub > GDrive > Local" >> $GITHUB_STEP_SUMMARY
