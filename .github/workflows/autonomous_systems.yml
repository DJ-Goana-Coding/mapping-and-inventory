name: Autonomous Systems Orchestration
on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  autonomous-orchestration:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Autonomous Health Monitor
        run: |
          python scripts/autonomous_health_monitor.py --output data/HEALTH_REPORT.md
          echo "✅ Health check complete"
      
      - name: Run District Harvester
        run: |
          python scripts/autonomous_district_harvester.py --all
          echo "✅ District harvest complete"
      
      - name: Run Pipeline Orchestrator
        run: |
          python scripts/master_pipeline_orchestrator.py
          echo "✅ Pipeline orchestration complete"
      
      - name: Commit generated artifacts
        run: |
          git config --global user.name "Citadel Architect Bot"
          git config --global user.email "citadel-architect@users.noreply.github.com"
          
          git add -A
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Autonomous systems update: Districts harvested, health checked, pipelines updated [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push
            echo "✅ Changes committed and pushed"
          fi
      
      - name: Generate Summary
        run: |
          echo "## 🤖 Autonomous Systems Orchestration Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Components Executed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Health Monitor" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ District Harvester" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Pipeline Orchestrator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "data/HEALTH_REPORT.md" ]; then
            echo "### Health Report" >> $GITHUB_STEP_SUMMARY
            cat data/HEALTH_REPORT.md >> $GITHUB_STEP_SUMMARY
          fi
