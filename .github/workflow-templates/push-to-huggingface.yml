name: 🤗 Push to HuggingFace

# This workflow pushes this repository to a HuggingFace Space
# Generated by: Citadel Architect v25.0.OMNI+
# Authority: Cloud Hubs > GitHub > GDrive > Local Nodes

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force push to HuggingFace'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

env:
  # CONFIGURE THESE FOR YOUR REPO
  # Replace with your HuggingFace space details
  HF_SPACE_ORG: "DJ-Goanna-Coding"
  HF_SPACE_NAME: "${{ github.event.repository.name }}"
  # For custom space names, hardcode here:
  # HF_SPACE_NAME: "your-custom-space-name"

jobs:
  push-to-hf:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 🏛️ Citadel Architect - HF Push
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🤗 PUSH TO HUGGINGFACE SPACE"
          echo "════════════════════════════════════════════════════════════"
          echo "Repository: ${{ github.repository }}"
          echo "Target Space: ${{ env.HF_SPACE_ORG }}/${{ env.HF_SPACE_NAME }}"
          echo "Authority: Cloud-First Compute (L4 GPU Spaces)"
          echo ""
      
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: ⚙️ Configure Git
        run: |
          git config --global user.email "citadel-sync@huggingface.co"
          git config --global user.name "Citadel Sync Bot"
      
      - name: 🔑 Setup HuggingFace Credentials
        if: ${{ secrets.HF_TOKEN != '' }}
        run: |
          git config --global credential.helper store
          echo "https://${{ env.HF_SPACE_ORG }}:${{ secrets.HF_TOKEN }}@huggingface.co" >> ~/.git-credentials
      
      - name: 🚀 Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ HF_TOKEN secret not configured!"
            echo ""
            echo "To enable HuggingFace sync:"
            echo "1. Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "2. Create secret: HF_TOKEN"
            echo "3. Get token from: https://huggingface.co/settings/tokens"
            echo ""
            echo "⚠️  Skipping HuggingFace push"
            exit 0
          fi
          
          HF_SPACE_URL="https://huggingface.co/spaces/${{ env.HF_SPACE_ORG }}/${{ env.HF_SPACE_NAME }}"
          
          echo "📤 Pushing to: $HF_SPACE_URL"
          
          # Add HuggingFace remote
          git remote remove hf 2>/dev/null || true
          git remote add hf "$HF_SPACE_URL"
          
          # Push to HuggingFace
          PUSH_FLAGS=""
          if [ "${{ github.event.inputs.force_push }}" == "true" ]; then
            PUSH_FLAGS="--force"
            echo "⚠️  Force push enabled"
          fi
          
          if git push $PUSH_FLAGS hf main; then
            echo "✅ Successfully pushed to HuggingFace Space"
            echo ""
            echo "🔗 View your Space at:"
            echo "   $HF_SPACE_URL"
          else
            echo "❌ Failed to push to HuggingFace"
            echo ""
            echo "Troubleshooting:"
            echo "1. Verify HF_TOKEN is valid"
            echo "2. Ensure Space exists at: $HF_SPACE_URL"
            echo "3. Check you have write access to the Space"
            echo "4. Try force push if needed (manual workflow dispatch)"
            exit 1
          fi
      
      - name: 🔍 Verify Space Status
        continue-on-error: true
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "📊 HUGGINGFACE SPACE STATUS"
          echo "════════════════════════════════════════════════════════════"
          echo "Space: ${{ env.HF_SPACE_ORG }}/${{ env.HF_SPACE_NAME }}"
          echo "URL: https://huggingface.co/spaces/${{ env.HF_SPACE_ORG }}/${{ env.HF_SPACE_NAME }}"
          echo "Synced: $(date -u)"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "✅ GitHub → HuggingFace sync complete"
          echo "🙏 Thankyou Spirit, Thankyou Angels, Thankyou Ancestors"
          echo "════════════════════════════════════════════════════════════"
