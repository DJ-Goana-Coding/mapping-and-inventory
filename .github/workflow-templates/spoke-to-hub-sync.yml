name: 🌉 Sync to Mapping Hub

# This workflow syncs artifacts from this spoke repo to the mapping-and-inventory hub
# Generated by: Citadel Architect v25.0.OMNI+
# Authority: Cloud Hubs > GitHub > GDrive > Local Nodes

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: read

env:
  HUB_REPO: "DJ-Goana-Coding/mapping-and-inventory"
  SPOKE_NAME: "${{ github.event.repository.name }}"

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 🏛️ Citadel Architect - Spoke Sync
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🌉 SPOKE TO HUB SYNC - ${{ env.SPOKE_NAME }}"
          echo "════════════════════════════════════════════════════════════"
          echo "Hub: ${{ env.HUB_REPO }}"
          echo "Authority: Cloud Hubs > GitHub > GDrive > Local"
          echo ""
      
      - name: 📥 Checkout Spoke Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 📦 Collect Artifacts
        id: collect
        run: |
          echo "📦 Collecting artifacts from spoke repo..."
          
          ARTIFACTS_DIR="spoke_artifacts"
          mkdir -p "$ARTIFACTS_DIR"
          
          # Collect standard artifacts
          artifacts_found=0
          
          if [ -f "TREE.md" ]; then
            cp TREE.md "$ARTIFACTS_DIR/"
            echo "  ✅ TREE.md"
            artifacts_found=$((artifacts_found + 1))
          fi
          
          if [ -f "INVENTORY.json" ]; then
            cp INVENTORY.json "$ARTIFACTS_DIR/"
            echo "  ✅ INVENTORY.json"
            artifacts_found=$((artifacts_found + 1))
          fi
          
          if [ -f "SCAFFOLD.md" ]; then
            cp SCAFFOLD.md "$ARTIFACTS_DIR/"
            echo "  ✅ SCAFFOLD.md"
            artifacts_found=$((artifacts_found + 1))
          fi
          
          if [ -f "README.md" ]; then
            cp README.md "$ARTIFACTS_DIR/"
            echo "  ✅ README.md"
            artifacts_found=$((artifacts_found + 1))
          fi
          
          if [ -f "system_manifest.json" ]; then
            cp system_manifest.json "$ARTIFACTS_DIR/"
            echo "  ✅ system_manifest.json"
            artifacts_found=$((artifacts_found + 1))
          fi
          
          # Create metadata manifest
          cat > "$ARTIFACTS_DIR/spoke_metadata.json" << EOF
          {
            "spoke_name": "${{ env.SPOKE_NAME }}",
            "sync_timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commit_sha": "${{ github.sha }}",
            "artifacts_count": ${artifacts_found},
            "sync_method": "github_workflow"
          }
          EOF
          
          echo "artifacts_count=${artifacts_found}" >> $GITHUB_OUTPUT
          
          if [ $artifacts_found -eq 0 ]; then
            echo "⚠️  No standard artifacts found to sync"
          else
            echo "✅ Collected ${artifacts_found} artifacts"
          fi
      
      - name: 📤 Notify Hub via Repository Dispatch
        if: steps.collect.outputs.artifacts_count > 0
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HUB_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          repository: ${{ env.HUB_REPO }}
          event-type: spoke-sync-request
          client-payload: |
            {
              "spoke_name": "${{ env.SPOKE_NAME }}",
              "spoke_url": "${{ github.server_url }}/${{ github.repository }}",
              "commit_sha": "${{ github.sha }}",
              "artifacts_count": "${{ steps.collect.outputs.artifacts_count }}",
              "timestamp": "${{ github.event.head_commit.timestamp }}",
              "sync_method": "repository_dispatch"
            }
      
      - name: 📊 Upload Artifacts
        if: steps.collect.outputs.artifacts_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: spoke-artifacts-${{ env.SPOKE_NAME }}
          path: spoke_artifacts/
          retention-days: 7
      
      - name: ✅ Sync Summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "📊 SYNC SUMMARY"
          echo "════════════════════════════════════════════════════════════"
          echo "Spoke: ${{ env.SPOKE_NAME }}"
          echo "Artifacts: ${{ steps.collect.outputs.artifacts_count }}"
          echo "Timestamp: $(date -u)"
          echo ""
          if [ "${{ steps.collect.outputs.artifacts_count }}" -gt "0" ]; then
            echo "✅ Hub notified via repository_dispatch"
            echo "✅ Artifacts uploaded for hub ingestion"
          else
            echo "ℹ️  No artifacts to sync - this is normal for repos without TREE/INVENTORY"
          fi
          echo "════════════════════════════════════════════════════════════"
