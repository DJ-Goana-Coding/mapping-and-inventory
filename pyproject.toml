[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (unused imports, undefined names, etc.)
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — enforced by formatter
    "B008",  # function calls in default args (FastAPI pattern)
]

[tool.ruff.lint.isort]
known-first-party = [
    "agents",
    "brain",
    "core",
    "nodes",
    "tasks",
    "utils",
    "backend",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
